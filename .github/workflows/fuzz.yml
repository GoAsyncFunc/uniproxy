name: Fuzz

on:
  schedule:
    - cron: '23 4 * * 2'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - FuzzNodeHandlersParseConfig
          - FuzzNormalizeRouteMatch
          - FuzzDNSMatches
          - FuzzValidateCommonNode
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25.10'

      - name: Download modules
        run: go mod download

      - name: Run fuzz target
        run: go test ./pkg -run '^$' -fuzz '^${{ matrix.target }}$' -fuzztime 30s
